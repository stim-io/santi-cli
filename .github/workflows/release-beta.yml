name: release-beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: Beta version like 0.1.0-beta.1
        required: true
        type: string
      ref:
        description: Git ref to release from
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      ref_sha: ${{ steps.ref.outputs.sha }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve release ref
        id: ref
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Record release tag
        id: meta
        run: |
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate beta release request
        run: python scripts/release_beta.py preflight --version "${{ inputs.version }}"

      - name: Run verification
        run: python scripts/verify.py

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref_sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release archive
        run: python scripts/release_beta.py package --version "${{ inputs.version }}" --target "${{ matrix.target }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref_sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Collate checksums
        run: python scripts/release_beta.py collate-checksums --dist-dir dist

      - name: Publish beta GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' files < <(find dist -type f -print0)
          gh release create "${{ needs.validate.outputs.tag }}" \
            --prerelease \
            --target "${{ needs.validate.outputs.ref_sha }}" \
            --title "${{ needs.validate.outputs.tag }}" \
            "${files[@]}"
