name: Release

on:
  push:
    tags:
      - "v0.1.0-beta.*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate beta tag
        shell: bash
        run: bash scripts/release/accept.sh "${{ github.ref_name }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run verification
        shell: bash
        run: bash scripts/verify.sh

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release archive
        shell: bash
        run: bash scripts/package.sh "${{ github.ref_name }}" "${{ matrix.target }}"

      - name: Generate checksum
        shell: bash
        run: bash scripts/release/checksum.sh "dist/checksums-${{ matrix.target }}.txt" dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collate checksums
        shell: bash
        run: bash scripts/release/collate.sh dist

      - name: Publish GitHub beta release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/**/*
            dist/checksums.txt
